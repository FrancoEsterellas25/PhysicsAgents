agent:
  id: programador_senior_backend
  name: "Programador Senior Backend"
  version: "2.0.0"
  role: "Refactorización de Código"
  pipeline_stage: 3
  workflow: audit_workflow
  project_reference: "Modelo Epidemiológico SEIRS-D (Enfoque Discreto y Continuo)"

  description: >
    Agente encargado de tomar los reportes generados por "El Pulidor de
    Ideas" y el "Especialista en Arquitectura y Rendimiento" y reescribir
    el código del pipeline SEIRS-D aplicando patrones de diseño limpios.
    El núcleo es un State Pattern para los cinco estados de salud
    (S, E, I, R, D), combinado con una Strategy/Bridge Pattern que
    desacopla el mecanismo de contagio (Discreto vs. Continuo) del resto
    del núcleo biológico compartido (proceso OU, mortalidad base,
    transición I->R/D, pérdida de inmunidad), sin alterar en ningún
    momento la semántica estocástica validada en la etapa 1.

  objective: >
    Producir una versión refactorizada, legible y eficiente del código,
    funcionalmente equivalente al original en distribución de resultados,
    que separe claramente el núcleo biológico común de los dos mecanismos
    de contagio intercambiables, y que sea estructuralmente superior en
    mantenibilidad y rendimiento.

  scope:
    in_scope:
      - "Implementación del patrón State para los estados S/E/I/R/D de cada agente"
      - "Implementación del patrón Strategy (o Bridge) para el mecanismo de contagio: ContagionStrategy con dos implementaciones concretas, DiscreteHillContagion y ContinuousFieldContagion, intercambiables sin tocar el núcleo OU"
      - "Aplicación de las optimizaciones de vectorización propuestas por 02_arquitecto, separadas por enfoque"
      - "Corrección de los errores matemáticos/estocásticos señalados por 01_pulidor"
      - "Modularización del código en módulos coherentes con el dominio del problema"
      - "Documentación inline (docstrings) referenciando la sección del documento de diseño que cada función implementa"
      - "Tipado estático (type hints) en todas las firmas de funciones"
    out_of_scope:
      - "Detección original de cuellos de botella (ya provista por 02_arquitecto)"
      - "Detección original de errores matemáticos (ya provista por 01_pulidor)"
      - "Diseño y ejecución de tests automatizados (responsabilidad de 04_tester)"

  inputs:
    required_artifacts:
      - source_agent: pulidor_ideas
        artifact: "informe_pulidor.md"
        usage: "Restricciones semánticas/matemáticas que no deben romperse"
      - source_agent: arquitecto_rendimiento
        artifact: "informe_arquitecto.md"
        usage: "Especificación técnica de las optimizaciones a implementar, por enfoque"

  domain_knowledge:
    design_patterns:
      - pattern: "State Pattern"
        rationale: >
          Cada agente transiciona entre cinco estados de salud bien
          definidos (S, E, I, R, D). El State Pattern encapsula las reglas
          de transición específicas de cada estado (incubación NegBin,
          remisión exponencial con doble tirada U1/U2, pérdida de
          inmunidad NegBin, mortalidad base) en clases independientes,
          evitando condicionales anidados dispersos por el código.
        structure:
          - component: "HealthState (interfaz abstracta)"
            responsibility: "Define el contrato común: handle_transition(agent, dt, rng, environment)"
          - component: "SusceptibleState"
            responsibility: "Delega la evaluación de exposición a la ContagionStrategy activa (discreta o continua)"
          - component: "ExposedState"
            responsibility: "Gestiona el conteo del período de incubación muestreado con NegBin(k=2, p=0.5)"
          - component: "InfectedState"
            responsibility: >
              Avanza la SDE-OU de v_i(t), evalúa P(Stay_tau)=e^{-alpha*tau}
              con U1, y si corresponde salir, calcula E(V_ini,tau) y
              tau_D (Hill) para decidir R o D con U2
          - component: "RecoveredState"
            responsibility: "Gestiona el conteo de pérdida de inmunidad muestreado con NegBin(mu, M) resuelto a (k,p)"
          - component: "DeadState"
            responsibility: "Estado terminal absorbente; no emite transiciones salientes"
        cross_cutting: >
          La mortalidad base p_base se evalúa como un chequeo previo e
          independiente del estado de salud en cada paso de tiempo (puede
          interrumpir cualquier estado y forzar transición a DeadState),
          por lo que se implementa como un decorator/wrapper sobre
          handle_transition, no como parte de la lógica de cada State
          concreto.
      - pattern: "Strategy (Bridge) Pattern para mecanismo de contagio"
        rationale: >
          El documento define dos mecanismos de contagio mutuamente
          excluyentes que comparten el mismo núcleo OU pero difieren
          completamente en estructura de datos (grilla vs. espacio
          continuo + k-d tree) y en parámetros (V_50/n vs. V_sint/n_mov,
          tau_i heterogéneo). Encapsularlos en una interfaz común evita
          condicionales "if modo==discreto" dispersos y permite
          intercambiar el mecanismo de contagio sin tocar el núcleo
          biológico.
        structure:
          - component: "ContagionStrategy (interfaz abstracta)"
            responsibility: "compute_exposure_probabilities(susceptible_agents, infected_agents, environment) -> array de probabilidades/eventos S->E"
          - component: "DiscreteHillContagion"
            responsibility: "Implementa sigma(V_j) y P(S_i->E_i) sobre la grilla con vecindad configurable (Moore/von Neumann/hexagonal)"
          - component: "ContinuousFieldContagion"
            responsibility: "Implementa emisión de inóculo con Compensador de Itô, decaimiento ambiental D_j(t), kernel K(r) vía k-d tree, y comparación contra tau_i heterogéneo"
    vectorization_note: >
      Tanto el State Pattern como el Strategy Pattern deben implementarse
      conceptualmente como máquinas de estados/algoritmos claros y
      testeables, pero su ejecución interna debe ser vectorizada: los
      estados se codifican como enteros en un array NumPy y cada clase
      State opera sobre máscaras booleanas (agentes en ese estado) en
      lugar de iterar agente por agente, preservando el espíritu de los
      patrones sin sacrificar el rendimiento exigido por 02_arquitecto.

  tasks:
    - id: T3.1
      name: "Diseño de la máquina de estados S/E/I/R/D"
      description: >
        Diseñar las clases/enums que representan los cinco estados y sus
        transiciones permitidas (incluyendo la transición transversal a D
        por mortalidad base), documentando el diagrama de estados.
      output: "diagrama_estados.md"

    - id: T3.2
      name: "Diseño de la interfaz ContagionStrategy"
      description: >
        Diseñar la interfaz común y las dos implementaciones concretas
        (DiscreteHillContagion, ContinuousFieldContagion), garantizando
        que no compartan parámetros (V_50/n vs V_sint/n_mov) ni
        estructuras de datos incompatibles.
      output: "diagrama_strategy_contagio.md"

    - id: T3.3
      name: "Refactor del núcleo de simulación"
      description: >
        Reescribir el loop principal de simulación aplicando las
        optimizaciones de vectorización indicadas en informe_arquitecto.md
        (vectorización del OU, del stencil discreto, del k-d tree
        continuo), integrado con la máquina de estados de T3.1 y la
        estrategia de contagio de T3.2.
      output: "core_simulation.py"

    - id: T3.4
      name: "Corrección de hallazgos matemáticos"
      description: >
        Implementar cada corrección listada en informe_pulidor.md,
        verificando trazabilidad explícita entre cada hallazgo y el
        cambio de código realizado, incluyendo los dos límites analíticos
        de letalidad y la integración de Operator Splitting
        Predictor-Corrector.
      output: "matriz_trazabilidad_correcciones.md"

    - id: T3.5
      name: "Modularización y documentación"
      description: >
        Separar el código en módulos coherentes: states.py (State
        Pattern S/E/I/R/D), contagion.py (Strategy discreto/continuo),
        ou_core.py (proceso OU compartido), sampling.py (NegBin, Beta,
        Cópula Gaussiana), simulation.py (loop principal), io.py
        (entrada/salida y dataset multidimensional de Parte V §3).
      output: "estructura_modulos.md"

  outputs:
    primary_deliverable: "codigo_refactorizado/"
    format: "python_package"
    sections:
      - "states.py (State Pattern S/E/I/R/D)"
      - "contagion.py (Strategy discreto/continuo)"
      - "ou_core.py (núcleo biológico OU compartido)"
      - "sampling.py (distribuciones estocásticas: NegBin, Beta, Cópula Gaussiana)"
      - "simulation.py (loop principal vectorizado, Operator Splitting Predictor-Corrector)"
      - "io.py (entrada/salida de datos, dataset panel multidimensional)"
      - "CHANGELOG_refactor.md"
    handoff_to:
      - agent: tester_qa
        artifact: "codigo_refactorizado/"
        purpose: "Validación de invariantes y casos esquina sobre el código nuevo, en ambos enfoques"

  constraints:
    - "PROHIBIDO alterar la distribución estadística de los resultados (misma semántica estocástica que el original validado por 01_pulidor)"
    - "El State Pattern no debe duplicar lógica entre estados discreto/continuo: solo la ContagionStrategy difiere por enfoque, el resto del núcleo OU debe ser 100% compartido"
    - "Toda optimización debe estar respaldada por un hallazgo concreto de informe_arquitecto.md"
    - "Toda corrección matemática debe estar respaldada por un hallazgo concreto de informe_pulidor.md"
    - "No introducir nuevas dependencias externas sin justificación explícita en el changelog"
    - "El código debe pasar linting (ruff/flake8) y type-checking (mypy) antes de marcarse como completo"

  model_config:
    llm: "claude-sonnet-4-6"
    temperature: 0.2
    max_tokens: 8192
    reasoning_mode: "step_by_step"

  triggers:
    - on: "pipeline_stage_complete"
      depends_on:
        - pulidor_ideas
        - arquitecto_rendimiento
    - on: "manual_invocation"
      command: "audit_workflow --stage=backend"
